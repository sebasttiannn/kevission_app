<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeVission - Tu Personal Shopper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --kv-ink: #1B1C20;
            --kv-ink-2: #2E3038;
            --kv-paper: #FFFFFF;
            --kv-mist: #F5F2EC;
            --kv-line: #E7E2D8;
            --kv-gold: #BD8A3F;
            --kv-gold-dark: #9C702E;
            --kv-gold-soft: #F1E3C4;
            --kv-muted: #6B6F76;
        }

        body {
            background-color: var(--kv-mist);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--kv-ink);
            padding-top: 76px;
        }

        /* Kept for compatibility with other pages still using this class */
        .card-hover:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        /* Navbar */
        .kv-navbar {
            background: linear-gradient(135deg, var(--kv-ink) 0%, var(--kv-ink-2) 100%);
            box-shadow: 0 4px 18px rgba(0,0,0,.14);
        }

        .kv-brand {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            letter-spacing: .01em;
            color: var(--kv-gold) !important;
            transition: opacity .2s ease;
        }

        .kv-brand:hover { opacity: .85; }

        .navbar-toggler:focus { box-shadow: none; }

        .kv-nav-link {
            position: relative;
            color: rgba(255,255,255,.82) !important;
            transition: color .2s ease;
        }

        .kv-nav-link::after {
            content: "";
            position: absolute;
            left: 1rem;
            right: 1rem;
            bottom: .15rem;
            height: 2px;
            background: var(--kv-gold);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform .25s ease;
        }

        .kv-nav-link:hover,
        .kv-nav-link:focus-visible {
            color: #fff !important;
        }

        .kv-nav-link:hover::after,
        .kv-nav-link:focus-visible::after {
            transform: scaleX(1);
        }

        .kv-btn-outline-gold {
            border: 1.5px solid var(--kv-gold);
            color: var(--kv-gold);
            background: transparent;
            transition: background-color .2s ease, color .2s ease;
        }

        .kv-btn-outline-gold:hover {
            background: var(--kv-gold);
            color: var(--kv-ink);
        }

        /* Flash messages */
        .kv-alert {
            background: var(--kv-paper);
            border: 1px solid var(--kv-line);
            border-left: 4px solid var(--kv-muted);
            border-radius: .75rem;
            color: var(--kv-ink);
        }

        .kv-alert.alert-success { border-left-color: #4C8B5B; }
        .kv-alert.alert-danger  { border-left-color: #B4453E; }
        .kv-alert.alert-warning { border-left-color: var(--kv-gold); }
        .kv-alert.alert-info    { border-left-color: #3E7B91; }
        .kv-alert.alert-primary { border-left-color: var(--kv-ink-2); }

        @media (prefers-reduced-motion: reduce) {
            .card-hover:hover, .kv-brand, .kv-nav-link, .kv-nav-link::after, .kv-btn-outline-gold {
                transition: none !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark kv-navbar fixed-top">
        <div class="container">
            <a class="navbar-brand fw-semibold kv-brand" href="{% if 'usuario_id' in session %}{{ url_for('dashboard') }}{% else %}#{% endif %}">
                <i class="bi bi-magic me-1"></i> KeVission
            </a>
            
            {% if 'usuario_id' in session %}
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link fw-medium px-3 kv-nav-link" href="{{ url_for('dashboard') }}">
                                <i class="bi bi-house-door-fill me-1"></i> Inicio
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-medium px-3 kv-nav-link" href="#">
                                <i class="bi bi-person-fill me-1"></i> Mi Perfil
                            </a>
                        </li>
                        <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                            <a class="btn kv-btn-outline-gold rounded-pill btn-sm px-4 fw-semibold" href="{{ url_for('auth.logout') }}">
                                <i class="bi bi-box-arrow-right me-1"></i> Salir
                            </a>
                        </li>
                    </ul>
                </div>
            {% endif %}
        </div>
    </nav>

    <div class="container mb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="row justify-content-center mt-4">
                    <div class="col-md-10">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show kv-alert" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
